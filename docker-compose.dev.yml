# ============================================================================
# ResumePilot AI — 开发环境覆盖
# ============================================================================
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# 特点:
#   - 热重载 (source mount + --watch)
#   - 调试端口开放
#   - 本地 .env 文件优先
# ============================================================================

version: "3.9"

services:
  # ==========================================================================
  # NestJS API (开发模式 — 热重载)
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: resumepilot-api-dev
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
      - "9229:9229" # 调试端口
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-resumepilot}:${DB_PASSWORD:-resumepilot}@postgres:5432/${DB_NAME:-resumepilot}?schema=public
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - ./apps/api/src:/app/apps/api/src # 源码热重载
      - ./apps/api/prisma:/app/apps/api/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - resumepilot

  # ==========================================================================
  # Next.js Web (开发模式 — 热重载)
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: resumepilot-web-dev
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-3001}
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    depends_on:
      - api
    networks:
      - resumepilot

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  resumepilot:
    driver: bridge
