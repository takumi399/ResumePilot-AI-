# ============================================================================
# ResumePilot AI — Docker Compose (基础服务)
# ============================================================================
# 使用方式:
#   开发: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   生产: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

version: "3.9"

services:
  # ==========================================================================
  # PostgreSQL 16 + pgvector
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resumepilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-resumepilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resumepilot}
      POSTGRES_DB: ${DB_NAME:-resumepilot}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-resumepilot} -d ${DB_NAME:-resumepilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resumepilot

  # ==========================================================================
  # Redis 7
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: resumepilot-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - resumepilot

  # ==========================================================================
  # MinIO (S3 兼容开发存储)
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: resumepilot-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - resumepilot

  # ==========================================================================
  # MinIO 初始化 (创建 bucket)
  # ==========================================================================
  minio-init:
    image: minio/mc:latest
    container_name: resumepilot-storage-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-resumepilot-resumes};
      mc anonymous set download local/${S3_BUCKET:-resumepilot-resumes};
      echo 'MinIO bucket initialized';
      "
    networks:
      - resumepilot

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  resumepilot:
    driver: bridge
